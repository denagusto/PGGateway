# Profile: cockroach — durable event store on the local CockroachDB cluster.
# Run with:  mvn spring-boot:run -Dspring-boot.run.profiles=cockroach
# (bring up the cluster first: docker compose up -d roach1 roach2 roach3 roach-init)

# re-enable DataSource auto-config (excluded in the default profile)
spring.autoconfigure.exclude=

spring.datasource.url=jdbc:postgresql://localhost:26257/pggateway?sslmode=disable
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
