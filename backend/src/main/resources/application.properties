spring.application.name=pggateway
# 8080 is taken by the CockroachDB console in docker-compose; backend uses 8081.
server.port=8081

# Default profile = in-memory event store, runs standalone with no database.
# The JDBC starter is on the classpath only for the 'cockroach' profile, so skip
# its DataSource auto-config here (re-enabled in application-cockroach.properties).
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
