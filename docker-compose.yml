# PGGateway — local development architecture
#
#   ┌─────────── CockroachDB (distributed SQL, 3 node) ───────────┐
#   │  roach1 (26257 SQL / 8080 Console) · roach2 · roach3         │
#   │  one logical cluster; data sharded/replicated across nodes   │
#   └──────────────────────────────────────────────────────────────┘
#        ▲ projections / ledger (later tasks)        ▲ idempotency cache
#        │                                           │
#   ┌────┴─────┐   events    ┌──────────┐       ┌────┴────┐
#   │  Kafka   │◄────────────│ backend  │──────►│  Redis  │
#   │ (KRaft)  │  partitions │ (Spring) │       └─────────┘
#   └──────────┘             └──────────┘
#
# Default `docker compose up` brings up: cockroach x3 + init + kafka + redis.
# Observability (Prometheus + Grafana): `docker compose --profile observability up`.
#
# Quick check after up:
#   CockroachDB Console : http://localhost:8080
#   Kafka bootstrap     : localhost:9092
#   Redis               : localhost:6379

name: pggateway

x-roach-image: &roach cockroachdb/cockroach:v24.2.5

services:
  roach1:
    image: *roach
    hostname: roach1
    command: start --insecure --join=roach1,roach2,roach3 --advertise-addr=roach1
    ports:
      - "26257:26257"   # SQL (Postgres wire-compatible)
      - "8080:8080"     # DB Console
    volumes:
      - roach1-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "cockroach", "node", "status", "--insecure", "--host=roach1"]
      interval: 10s
      timeout: 5s
      retries: 6

  roach2:
    image: *roach
    hostname: roach2
    command: start --insecure --join=roach1,roach2,roach3 --advertise-addr=roach2
    volumes:
      - roach2-data:/cockroach/cockroach-data

  roach3:
    image: *roach
    hostname: roach3
    command: start --insecure --join=roach1,roach2,roach3 --advertise-addr=roach3
    volumes:
      - roach3-data:/cockroach/cockroach-data

  # Initialises the 3-node cluster once, then creates the pggateway database.
  roach-init:
    image: *roach
    depends_on: [roach1, roach2, roach3]
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        cockroach init --insecure --host=roach1 || true;
        cockroach sql --insecure --host=roach1 -e
        "CREATE DATABASE IF NOT EXISTS pggateway;"

  kafka:
    image: apache/kafka:3.8.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 12   # default partitions → exercises shard-per-account model
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    hostname: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ---- observability (opt-in): docker compose --profile observability up ----
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.2
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    depends_on: [prometheus]

volumes:
  roach1-data:
  roach2-data:
  roach3-data:
  redis-data:
