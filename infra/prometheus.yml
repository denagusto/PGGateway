global:
  scrape_interval: 15s

scrape_configs:
  # Spring Boot backend running on the host (expose /actuator/prometheus later).
  - job_name: pggateway-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
